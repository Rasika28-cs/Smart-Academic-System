{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Sign Up - Smart Attendance</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    :root{--primary:#1a56db;--primary-dk:#1342b0;--primary-lt:#e8f0fd;--accent:#0ea472;--accent-lt:#e6f7f1;--surface:#fff;--bg:#f1f5f9;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;--danger:#dc2626;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
    .sa-nav{height:64px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 32px;gap:16px;}
    .sa-nav-brand{display:flex;align-items:center;gap:8px;font-weight:700;color:var(--primary);text-decoration:none;}
    .sa-nav-links{display:flex;gap:4px;margin-left:auto;list-style:none;}
    .sa-nav-links a{padding:6px 14px;border-radius:8px;font-size:14px;font-weight:500;color:var(--muted);text-decoration:none;transition:all .15s;}
    .sa-nav-links a:hover{background:var(--bg);color:var(--text);}
    .sa-nav-links a.active{background:var(--primary-lt);color:var(--primary);}
    .main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 16px;}
    .signup-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;box-shadow:0 4px 6px rgba(0,0,0,.05),0 10px 40px rgba(0,0,0,.1);padding:40px;width:100%;max-width:480px;}
    .signup-icon{width:56px;height:56px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:#fff;margin:0 auto 20px;}
    .signup-title{text-align:center;margin-bottom:28px;}
    .signup-title h2{font-size:1.4rem;font-weight:700;}
    .signup-title p{font-size:13px;color:var(--muted);margin-top:4px;}
    .sa-form-group{margin-bottom:16px;}
    .sa-label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;}
    .sa-input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);background:var(--surface);transition:all .15s;outline:none;}
    .sa-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(26,86,219,.1);}
    .sa-btn-primary{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .18s;}
    .sa-btn-primary:hover{background:var(--primary-dk);box-shadow:0 4px 14px rgba(26,86,219,.3);transform:translateY(-1px);}
    .sa-alert-danger{background:#fee2e2;color:#991b1b;border:1px solid #fecaca;padding:10px 14px;border-radius:10px;font-size:13px;font-weight:500;margin-bottom:16px;}
    .footer{background:var(--surface);border-top:1px solid var(--border);text-align:center;padding:14px;font-size:13px;color:var(--muted);}
  </style>
</head>
<body>

<nav class="sa-nav">
  <a class="sa-nav-brand" href="{% url 'home' %}">
    <i class="bi bi-mortarboard-fill" style="font-size:1.3rem;"></i> Smart Attendance
  </a>
  <ul class="sa-nav-links">
    <li><a href="{% url 'home' %}">Home</a></li>
    <li><a href="{% url 'login_page' %}">Login</a></li>
    <li><a href="#" class="active">Sign Up</a></li>
  </ul>
</nav>

<main class="main">
  <div class="signup-card">
    <div class="signup-icon">👤</div>
    <div class="signup-title">
      <h2>Create Account</h2>
      <p>Register to use Smart Attendance System</p>
    </div>

    {% if error %}
    <div class="sa-alert-danger">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{% url 'signup_page' %}">
      {% csrf_token %}
      <div class="sa-form-group">
        <label class="sa-label">Full Name</label>
        <input class="sa-input" type="text" name="name" placeholder="Your full name" required>
      </div>
      <div class="sa-form-group">
        <label class="sa-label">Email</label>
        <input class="sa-input" type="email" name="email" placeholder="you@example.com" required>
      </div>
      <div class="sa-form-group">
        <label class="sa-label">Password</label>
        <input class="sa-input" type="password" name="password" placeholder="Choose a password" required>
      </div>
      <div class="sa-form-group">
        <label class="sa-label">Confirm Password</label>
        <input class="sa-input" type="password" name="confirm_password" placeholder="Repeat your password" required>
      </div>
      <button type="submit" class="sa-btn-primary">
        <i class="bi bi-person-check"></i> Create Account
      </button>
    </form>

    <p style="text-align:center;font-size:13px;color:var(--muted);margin-top:18px;">
      Already have an account? <a href="{% url 'login_page' %}" style="color:var(--primary);font-weight:600;text-decoration:none;">Login</a>
    </p>
  </div>
</main>

<footer class="footer">&copy; 2026 Smart Attendance System</footer>
</body>
</html>
