<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Register - Smart Attendance</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    :root{--primary:#1a56db;--primary-dk:#1342b0;--primary-lt:#e8f0fd;--accent:#0ea472;--surface:#fff;--bg:#f1f5f9;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;}
    .reg-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;box-shadow:0 4px 6px rgba(0,0,0,.05),0 10px 40px rgba(0,0,0,.1);padding:40px;width:100%;max-width:400px;margin:20px;}
    .reg-icon{width:52px;height:52px;background:linear-gradient(135deg,var(--accent),var(--primary));border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:#fff;margin:0 auto 20px;}
    h2{text-align:center;font-size:1.4rem;font-weight:700;margin-bottom:6px;}
    .sub{text-align:center;font-size:13px;color:var(--muted);margin-bottom:28px;}
    .sa-form-group{margin-bottom:16px;}
    .sa-label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;}
    .sa-input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);background:var(--surface);transition:all .15s;outline:none;}
    .sa-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(26,86,219,.1);}
    .sa-btn-accent{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .18s;}
    .sa-btn-accent:hover{background:#0b8a5e;transform:translateY(-1px);}
    .footer-link{text-align:center;font-size:13px;color:var(--muted);margin-top:16px;}
    .footer-link a{color:var(--primary);font-weight:600;text-decoration:none;}
  </style>
</head>
<body>

<div class="reg-card">
  <div class="reg-icon">👤</div>
  <h2>Create Account</h2>
  <p class="sub">Register for Smart Attendance</p>

  <form method="POST">
    {% csrf_token %}
    <div class="sa-form-group">
      <label class="sa-label">Username</label>
      <input class="sa-input" type="text" name="username" placeholder="Choose a username" required/>
    </div>
    <div class="sa-form-group">
      <label class="sa-label">Password</label>
      <input class="sa-input" type="password" name="password" placeholder="Choose a password" required/>
    </div>
    <button type="submit" class="sa-btn-accent">
      <i class="bi bi-person-check"></i> Register
    </button>
  </form>

  <p class="footer-link">
    Already have an account? <a href="{% url 'login_page' %}">Login</a>
  </p>
</div>

</body>
</html>
