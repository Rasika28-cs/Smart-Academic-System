{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Create Timetable - Smart Academic System</title>
<link rel="icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}">

  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #F8FAFC;
      color: #0F172A;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .input-field {
      width: 100%;
      border: 1px solid #e2e8f0;
      border-radius: 0.75rem;
      background: white;
      padding: 0.75rem 1rem;
      font-size: 0.875rem;
      transition: all 0.2s ease;
    }

    .input-field:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
    }

    .form-label {
      display: block;
      margin-bottom: 0.5rem;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
    }

    .form-container {
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1),
        0 2px 4px -2px rgb(0 0 0 / 0.1);
    }

    .nav-link:hover {
      background-color: #F1F5F9;
      color: #2563EB;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="h-16 bg-white border-b border-slate-200 flex items-center px-6 md:px-8 gap-4 sticky top-0 z-50">
    <a class="flex items-center gap-2 font-bold text-blue-600 text-lg no-underline" href="{% url 'cr_dashboard' %}">
      <span class="material-symbols-outlined">school</span>
      <span class="hidden sm:inline">Smart Academic System</span>
    </a>

    <ul class="flex gap-1 ml-auto items-center">
      <li>
        <a class="nav-link px-3 py-2 rounded-lg text-[13px] font-medium text-slate-500 no-underline"
          href="{% url 'dashboard' %}">
          Dashboard
        </a>
      </li>
      <li>
        <a class="nav-link px-3 py-2 rounded-lg text-[13px] font-medium text-red-500 no-underline"
          href="{% url 'logout' %}">
          Logout
        </a>
      </li>
    </ul>
  </nav>

  <!-- MAIN -->
  <div class="flex-1 py-10 px-4 md:px-6 max-w-5xl mx-auto w-full">

    <!-- HEADER -->
    <div class="mb-8">
      <h1 class="text-2xl font-bold text-slate-900 flex items-center gap-2">
        <span class="material-symbols-outlined text-blue-600">schedule</span>
        Create Timetable
      </h1>
      <p class="text-slate-500 text-sm mt-1">
        Create and manage timetable slots for your department
      </p>
    </div>

    <!-- FORM CARD -->
    <div class="bg-white border border-slate-200 rounded-2xl form-container overflow-hidden">
      <form method="POST" class="p-6 md:p-8 space-y-6">
        {% csrf_token %}

        <!-- ROW 1 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

          <!-- DAY -->
          <div>
            <label class="form-label">Day of Week</label>
            <select name="day" class="input-field" required>
              <option value="" disabled selected>Select day</option>
              <option value="Mon">Monday</option>
              <option value="Tue">Tuesday</option>
              <option value="Wed">Wednesday</option>
              <option value="Thu">Thursday</option>
              <option value="Fri">Friday</option>
              <option value="Sat">Saturday</option>
            </select>
          </div>

          <!-- ROOM -->
          <div>
            <label class="form-label">Room / Lab</label>
            <input type="text" name="room" class="input-field" placeholder="e.g. Lab 402, LH-01" required />
          </div>

        </div>

        <!-- ROW 2 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

          <div>
            <label class="form-label">Start Time</label>
            <input type="time" name="start_time" class="input-field" required />
          </div>

          <div>
            <label class="form-label">End Time</label>
            <input type="time" name="end_time" class="input-field" required />
          </div>

          <div>
            <label class="form-label">Batch</label>
            <input type="text" name="batch" class="input-field" placeholder="e.g. CSE-A" required />
          </div>

        </div>

        <!-- ROW 3 -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

          <!-- TEACHER -->
          <div>
            <label class="form-label">Teacher</label>
            <select name="teacher" class="input-field" required>
              <option value="" disabled selected>Select teacher</option>
              {% for teacher in teachers %}
              <option value="{{ teacher.id }}">{{ teacher.username }}</option>
              {% endfor %}
            </select>
          </div>

          <!-- SUBJECT -->
          <div>
            <label class="form-label">Subject</label>
            <select name="subject" class="input-field" required>
              <option value="" disabled selected>Select subject</option>
              {% for subject in subjects %}
              <option value="{{ subject.id }}">{{ subject.name }}</option>
              {% endfor %}
            </select>
          </div>

        </div>

        <!-- DEPARTMENT -->
        <div>
          <label class="form-label">Department</label>
          <select name="department" class="input-field" required>
            <option value="" disabled selected>Select department</option>
            {% for dept in departments %}
            <option value="{{ dept.id }}">{{ dept.name }}</option>
            {% endfor %}
          </select>
        </div>

        <!-- ACTIONS -->
        <div class="pt-4 border-t border-slate-100 flex justify-end gap-3">
          <a href="{% url 'cr_dashboard' %}"
            class="px-6 py-3 rounded-xl border border-slate-200 text-slate-600 text-sm font-semibold hover:bg-slate-50 transition-all no-underline">
            Cancel
          </a>

          <button type="submit"
            class="px-6 py-3 rounded-xl bg-blue-600 text-white text-sm font-semibold hover:bg-blue-700 transition-all shadow-lg shadow-blue-200">
            Create Timetable
          </button>
        </div>

      </form>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="mt-auto py-8 text-center border-t border-slate-200">
    <p class="text-xs text-slate-500 font-medium">
      &copy; 2026 Smart Academic System • Department of CSE (Cyber Security)
    </p>
  </footer>

</body>

</html>
