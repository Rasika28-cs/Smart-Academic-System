<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Student Grades</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Font for Modern Look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
        .card {
            border: none;
            border-radius: 12px;
        }
        .form-control:focus, .form-select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 0.25rem rgba(59, 130, 246, 0.25);
        }
    </style>
</head>
<body class="min-vh-100 d-flex align-items-center py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-8 col-lg-6 col-xl-5">
                <div class="card shadow-lg">
                    <div class="card-body p-4 p-sm-5">
                        <h2 class="card-title text-center mb-4 fw-bold text-dark">Upload Student Grades</h2>
                        
                        <!-- Info Box -->
                        <div class="alert alert-info d-flex align-items-start gap-2 mb-4" role="alert">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" class="bi bi-info-circle-fill flex-shrink-0 mt-0.5" viewBox="0 0 16 16">
                                <path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16zm.93-9.412-1 4.705c-.07.34.029.533.304.533.194 0 .487-.07.686-.246l-.088.416c-.287.346-.92.598-1.465.598-.703 0-1.002-.422-.808-1.319l.738-3.468c.064-.293.006-.399-.287-.47l-.451-.081.082-.381 2.29-.287zM8 5.5a1 1 0 1 1 0-2 1 1 0 0 1 0 2z"/>
                            </svg>
                            <div>
                                <small class="fw-semibold">Upload Excel or CSV file with Register No as first column</small>
                            </div>
                        </div>

                        <!-- Django Grade Upload Form -->
                        <form method="POST" enctype="multipart/form-data" class="needs-validation" novalidate>
                            {% csrf_token %}
                            
                            <!-- Title Input -->
                            <div class="mb-3">
                                <label for="title" class="form-label fw-semibold text-secondary">Title</label>
                                <input type="text" class="form-control" id="title" name="title" placeholder="e.g., Spring 2026 Finals" required>
                                <div class="invalid-feedback">
                                    Please enter a valid title.
                                </div>
                            </div>

                            <!-- Semester Dropdown -->
                            <div class="mb-3">
                                <label for="semester" class="form-label fw-semibold text-secondary">Semester</label>
                                <select class="form-select" id="semester" name="semester" required>
                                    <option value="" disabled selected>Choose a semester</option>
                                    <option value="1">Semester 1</option>
                                    <option value="2">Semester 2</option>
                                    <option value="3">Semester 3</option>
                                    <option value="4">Semester 4</option>
                                    <option value="5">Semester 5</option>
                                    <option value="6">Semester 6</option>
                                    <option value="7">Semester 7</option>
                                    <option value="8">Semester 8</option>
                                </select>
                                <div class="invalid-feedback">
                                    Please select a semester.
                                </div>
                            </div>

                            <!-- File Upload Input -->
                            <div class="mb-4">
                                <label for="gradeFile" class="form-label fw-semibold text-secondary">Grade File</label>
                                <input class="form-control" type="file" id="gradeFile" name="grade_file" accept=".csv, .xlsx" required>
                                <div class="form-text mt-1">Accepted formats: .csv, .xlsx</div>
                                <div class="invalid-feedback">
                                    Please choose a valid spreadsheet (.csv or .xlsx).
                                </div>
                            </div>

                            <!-- Submit Button -->
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary py-2.5 fw-semibold shadow-sm">Upload Grades</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Bootstrap Validation Script -->
    <script>
        (() => {
            'use strict'
            const forms = document.querySelectorAll('.needs-validation')
            Array.from(forms).forEach(form => {
                form.addEventListener('submit', event => {
                    if (!form.checkValidity()) {
                        event.preventDefault()
                        event.stopPropagation()
                    }
                    form.classList.add('was-validated')
                }, false)
            })
        })()
    </script>
</body>
</html>
