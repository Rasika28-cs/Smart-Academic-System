<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Student List - Smart Attendance</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    :root{--primary:#1a56db;--primary-dk:#1342b0;--primary-lt:#e8f0fd;--accent:#0ea472;--accent-lt:#e6f7f1;--surface:#fff;--bg:#f1f5f9;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;--danger:#dc2626;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
    .sa-nav{height:64px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 32px;gap:16px;}
    .sa-nav-brand{display:flex;align-items:center;gap:8px;font-weight:700;color:var(--primary);text-decoration:none;}
    .sa-nav-links{display:flex;gap:4px;margin-left:auto;list-style:none;}
    .sa-nav-links a{padding:6px 12px;border-radius:8px;font-size:13px;font-weight:500;color:var(--muted);text-decoration:none;}
    .sa-nav-links a.logout{color:var(--danger);}
    .sa-page{flex:1;padding:32px 24px;max-width:800px;margin:0 auto;width:100%;}
    .page-header{margin-bottom:24px;}
    .page-header h1{font-size:1.4rem;font-weight:700;}
    .page-header p{color:var(--muted);font-size:13px;margin-top:4px;}
    .sa-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);}
    .sa-table{width:100%;border-collapse:collapse;}
    .sa-table thead tr{background:linear-gradient(90deg,var(--primary),#2563eb);}
    .sa-table th{padding:12px 16px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:rgba(255,255,255,.9);text-align:left;}
    .sa-table td{padding:13px 16px;font-size:14px;border-bottom:1px solid var(--border);vertical-align:middle;}
    .sa-table tbody tr:last-child td{border-bottom:none;}
    .sa-table tbody tr:hover{background:#fafbfd;}
    .avatar{width:34px;height:34px;border-radius:50%;background:var(--primary-lt);color:var(--primary);display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;margin-right:10px;}
    .name-cell{display:flex;align-items:center;}
    .sa-footer{background:var(--surface);border-top:1px solid var(--border);text-align:center;padding:16px;font-size:13px;color:var(--muted);}
  </style>
</head>
<body>

<nav class="sa-nav">
  <a class="sa-nav-brand" href="{% url 'teacher_dashboard' %}">
    <i class="bi bi-mortarboard-fill" style="font-size:1.3rem;"></i> Smart Attendance
  </a>
  <ul class="sa-nav-links">
    <li><a href="{% url 'teacher_dashboard' %}">Dashboard</a></li>
    <li><a href="{% url 'logout' %}" class="logout">Logout</a></li>
  </ul>
</nav>

<div class="sa-page">
  <div class="page-header">
    <h1>👥 Student List</h1>
    <p>All enrolled students in your department</p>
  </div>

  <div class="sa-card">
    <table class="sa-table">
      <thead>
        <tr><th>Student</th></tr>
      </thead>
      <tbody>
        {% for student in students %}
        <tr>
          <td>
            <div class="name-cell">
              <span class="avatar">{{ student.name|slice:":1" }}</span>
              <strong>{{ student.name }}</strong>
            </div>
          </td>
          
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>

<footer class="sa-footer">&copy; 2026 Smart Attendance System</footer>
</body>
</html>
