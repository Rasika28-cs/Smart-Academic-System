<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Student List - Smart Academic System</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

<style>
  body {
    font-family: 'Inter', sans-serif;
    background: #f8fafc;
    color: #0f172a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  .avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: #2563eb;
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
  }

  .card {
    background: white;
    border: 1px solid #e2e8f0;
    border-radius: 16px;
    overflow: hidden;
  }
</style>
</head>

<body>

<!-- HEADER -->
<nav class="h-16 bg-white border-b flex items-center px-6 sticky top-0 z-50">
  <a href="{% url 'dashboard' %}" class="flex items-center gap-2 font-bold text-blue-600">
    <span class="material-symbols-outlined">school</span>
    Smart Attendance
  </a>

  <ul class="ml-auto flex items-center gap-2 text-sm">
    <li>
      <a href="{% url 'dashboard' %}" class="px-3 py-2 text-slate-500 hover:text-blue-600 hover:bg-slate-100 rounded-lg">
        Dashboard
      </a>
    </li>
    <li>
      <a href="{% url 'logout' %}" class="px-3 py-2 text-red-500 hover:bg-red-50 rounded-lg">
        Logout
      </a>
    </li>
  </ul>
</nav>

<!-- CONTENT -->
<main class="flex-1 max-w-5xl mx-auto w-full p-6">

  <div class="mb-6">
    <h2 class="text-2xl font-bold">Student List</h2>
    <p class="text-sm text-slate-500">All enrolled students in your department</p>
  </div>

  <div class="card shadow-sm">

    <table class="w-full">

      <thead class="bg-slate-100">
        <tr>
          <th class="text-left p-4 text-xs uppercase text-slate-500 font-semibold">
            Student
          </th>
        </tr>
      </thead>

      <tbody>

        {% for student in students %}
        <tr class="border-t hover:bg-slate-50 transition">

          <td class="p-4">
            <div class="flex items-center gap-3">

              <div class="avatar">
                {{ student.name|slice:":1" }}
              </div>

              <strong class="text-slate-900">
                {{ student.name }}
              </strong>

            </div>
          </td>

        </tr>
        {% endfor %}

      </tbody>

    </table>

  </div>

</main>

<!-- FOOTER -->
<footer class="mt-auto py-6 text-center border-t text-xs text-slate-500">
  © 2026 Smart Academic System • Department of CSE
</footer>

</body>
</html>
