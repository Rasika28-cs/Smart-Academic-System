{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Apply Leave - Smart Attendance</title>
  <link rel="icon" type="image/x-icon" href="{% static 'assets/favicon.ico' %}"/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="{% static 'css/styles.css' %}" rel="stylesheet"/>
  <style>
    :root{--primary:#1a56db;--primary-dk:#1342b0;--primary-lt:#e8f0fd;--accent:#0ea472;--accent-lt:#e6f7f1;--surface:#fff;--bg:#f1f5f9;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;--danger:#dc2626;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
    .sa-nav{position:sticky;top:0;z-index:100;height:64px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 32px;gap:16px;}
    .sa-nav-brand{display:flex;align-items:center;gap:8px;font-weight:700;color:var(--primary);text-decoration:none;}
    .sa-nav-links{display:flex;gap:4px;margin-left:auto;list-style:none;}
    .sa-nav-links a{padding:6px 12px;border-radius:8px;font-size:13px;font-weight:500;color:var(--muted);text-decoration:none;transition:all .15s;}
    .sa-nav-links a:hover{background:var(--bg);color:var(--text);}
    .sa-nav-links a.active{background:var(--primary-lt);color:var(--primary);}
    .sa-nav-links a.logout{color:var(--danger);}
    .sa-nav-links a.logout:hover{background:#fee2e2;}
    .sa-page{flex:1;padding:40px 24px;display:flex;justify-content:center;}
    .form-wrap{width:100%;max-width:560px;}
    .page-header{margin-bottom:24px;}
    .page-header h1{font-size:1.4rem;font-weight:700;}
    .page-header p{color:var(--muted);font-size:13px;margin-top:4px;}
    .sa-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;box-shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);padding:32px;}
    .sa-form-group{margin-bottom:18px;}
    .sa-label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;}
    .sa-input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);background:var(--surface);transition:all .15s;outline:none;}
    .sa-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(26,86,219,.1);}
    textarea.sa-input{resize:vertical;min-height:110px;}
    .sa-btn-primary{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .18s;}
    .sa-btn-primary:hover{background:var(--primary-dk);box-shadow:0 4px 14px rgba(26,86,219,.3);transform:translateY(-1px);}
    #msg{text-align:center;font-size:14px;font-weight:600;margin-top:12px;min-height:20px;}
    .sa-footer{background:var(--surface);border-top:1px solid var(--border);text-align:center;padding:16px;font-size:13px;color:var(--muted);}
    .date-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    @media(max-width:480px){.date-row{grid-template-columns:1fr;}}
  </style>
</head>
<body>

<nav class="sa-nav">
  <a class="sa-nav-brand" href="{% url 'student_dashboard' %}">
    <i class="bi bi-mortarboard-fill" style="font-size:1.3rem;"></i> Smart Attendance
  </a>
  <ul class="sa-nav-links">
    <li><a href="{% url 'student_dashboard' %}">Dashboard</a></li>
    <li><a href="{% url 'apply_page' %}" class="active">Apply Leave</a></li>
    <li><a href="{% url 'logout' %}" class="logout">Logout</a></li>
  </ul>
</nav>

<div class="sa-page">
  <div class="form-wrap">
    <div class="page-header">
      <h1>✍️ Apply for Leave</h1>
      <p>Fill in the details below to submit your leave request.</p>
    </div>

    <div class="sa-card">
      <form id="leaveForm">
        {% csrf_token %}
        <div class="date-row">
          <div class="sa-form-group">
            <label class="sa-label" for="from_date">From Date</label>
            <input class="sa-input" type="date" id="from_date" required/>
          </div>
          <div class="sa-form-group">
            <label class="sa-label" for="to_date">To Date</label>
            <input class="sa-input" type="date" id="to_date" required/>
          </div>
        </div>
        <div class="sa-form-group">
          <label class="sa-label" for="reason">Reason for Leave</label>
          <textarea class="sa-input" id="reason" placeholder="Briefly describe your reason..." required></textarea>
        </div>
        <button type="submit" class="sa-btn-primary">
          <i class="bi bi-send"></i> Submit Leave Request
        </button>
        <p id="msg"></p>
      </form>
    </div>
  </div>
</div>

<footer class="sa-footer">&copy; 2026 Smart Attendance System</footer>

<script>
document.getElementById("leaveForm").addEventListener("submit", function(e) {
    e.preventDefault();
    const csrftoken = document.querySelector("[name=csrfmiddlewaretoken]").value;
    fetch("{% url 'apply_leave_api' %}", {
        method: "POST",
        headers: {"Content-Type": "application/json","X-CSRFToken": csrftoken},
        body: JSON.stringify({
            from_date: document.getElementById("from_date").value,
            to_date: document.getElementById("to_date").value,
            reason: document.getElementById("reason").value
        })
    })
    .then(r => r.json())
    .then(data => {
        if (data.status === "success") {
            document.getElementById("msg").innerHTML = "<span style='color:#0ea472;'>✅ Leave Applied Successfully!</span>";
            setTimeout(() => { window.location.href = "{% url 'student_dashboard' %}"; }, 1200);
        } else {
            document.getElementById("msg").innerHTML = "<span style='color:#dc2626;'>⚠ " + data.message + "</span>";
        }
    })
    .catch(() => {
        document.getElementById("msg").innerHTML = "<span style='color:#dc2626;'>Server Error. Try again.</span>";
    });
});
</script>
</body>
</html>
