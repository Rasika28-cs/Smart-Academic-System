<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Raise Complaint - Smart Attendance</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
  <style>
    :root{--primary:#1a56db;--primary-dk:#1342b0;--primary-lt:#e8f0fd;--accent:#0ea472;--surface:#fff;--bg:#f1f5f9;--border:#e2e8f0;--text:#0f172a;--muted:#64748b;--danger:#dc2626;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}
    .sa-nav{height:64px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 32px;gap:16px;}
    .sa-nav-brand{display:flex;align-items:center;gap:8px;font-weight:700;color:var(--primary);text-decoration:none;}
    .sa-nav-links{display:flex;gap:4px;margin-left:auto;list-style:none;}
    .sa-nav-links a{padding:6px 12px;border-radius:8px;font-size:13px;font-weight:500;color:var(--muted);text-decoration:none;}
    .sa-nav-links a.logout{color:var(--danger);}
    .sa-page{flex:1;padding:40px 24px;display:flex;justify-content:center;}
    .form-wrap{width:100%;max-width:540px;}
    .page-header{margin-bottom:24px;}
    .page-header h1{font-size:1.4rem;font-weight:700;}
    .page-header p{color:var(--muted);font-size:13px;margin-top:4px;}
    .sa-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;box-shadow:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);padding:32px;}
    /* Django auto-form styling */
    .sa-card p{margin-bottom:14px;}
    .sa-card label{display:block;font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;}
    .sa-card input[type=text],.sa-card input[type=email],.sa-card textarea,.sa-card select{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);background:var(--surface);transition:border-color .15s;outline:none;}
    .sa-card input:focus,.sa-card textarea:focus,.sa-card select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(26,86,219,.1);}
    .sa-card textarea{resize:vertical;min-height:110px;}
    .sa-btn-primary{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px 28px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .18s;}
    .sa-btn-primary:hover{background:var(--primary-dk);transform:translateY(-1px);}
    .sa-footer{background:var(--surface);border-top:1px solid var(--border);text-align:center;padding:16px;font-size:13px;color:var(--muted);}
  </style>
</head>
<body>

<nav class="sa-nav">
  <a class="sa-nav-brand" href="{% url 'student_dashboard' %}">
    <i class="bi bi-mortarboard-fill" style="font-size:1.3rem;"></i> Smart Attendance
  </a>
  <ul class="sa-nav-links">
    <li><a href="{% url 'student_dashboard' %}">Dashboard</a></li>
    <li><a href="{% url 'logout' %}" class="logout">Logout</a></li>
  </ul>
</nav>

<div class="sa-page">
  <div class="form-wrap">
    <div class="page-header">
      <h1>📢 Raise a Complaint</h1>
      <p>Submit your feedback or concern to the administration</p>
    </div>

    <div class="sa-card">
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="sa-btn-primary">
          <i class="bi bi-send"></i> Submit Complaint
        </button>
      </form>
    </div>
  </div>
</div>

<footer class="sa-footer">&copy; 2026 Smart Attendance System</footer>
</body>
</html>
